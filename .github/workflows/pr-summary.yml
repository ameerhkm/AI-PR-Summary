name: AI PR Summary with Mistral

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - develop

permissions:
  pull-requests: write
  contents: read

jobs:
  generate-summary:
    runs-on: ubuntu-latest
    name: Generate PR Summary
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR details
        id: pr_details
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_BODY="${{ github.event.pull_request.body }}"
          
          # Get the diff between PR branches
          git fetch origin ${{ github.event.pull_request.head.ref }}
          DIFF=$(git diff origin/${{ github.event.pull_request.base.ref }}...origin/${{ github.event.pull_request.head.ref }} --stat)
          
          # Store in files for next step
          echo "$PR_TITLE" > /tmp/pr_title.txt
          echo "$PR_BODY" > /tmp/pr_body.txt
          echo "$DIFF" > /tmp/pr_diff.txt
          
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Create AI summary with Mistral
        id: summary
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          cat > /tmp/generate_summary.js << 'EOF'
          const fs = require("fs");
          
          const title = fs.readFileSync("/tmp/pr_title.txt", "utf8").trim();
          const body = fs.readFileSync("/tmp/pr_body.txt", "utf8").trim();
          const diff = fs.readFileSync("/tmp/pr_diff.txt", "utf8").trim();
          
          const prompt = `You are a helpful code reviewer. Generate a concise GitHub PR summary comment based on:
          
          PR Title: ${title}
          PR Description: ${body}
          Changes Summary: ${diff}
          
          Please provide:
          1. A brief summary of what the PR does
          2. Key changes made
          3. Impact assessment
          4. Any potential concerns or considerations
          
          Format as a GitHub markdown comment (friendly and constructive). Keep it under 500 words.`;
          
          // Using Mistral API via Hugging Face Inference
          (async () => {
            try {
              const response = await fetch("https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.1", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  "Authorization": `Bearer ${process.env.MISTRAL_API_KEY}`
                },
                body: JSON.stringify({
                  inputs: prompt,
                  parameters: {
                    max_new_tokens: 500,
                    temperature: 0.7,
                    top_p: 0.9
                  }
                })
              });
              
              if (!response.ok) {
                const error = await response.text();
                throw new Error(`Mistral API error: ${response.status} - ${error}`);
              }
              
              const data = await response.json();
              let summary = data[0].generated_text;
              
              // Remove the prompt from the output
              if (summary.includes(prompt)) {
                summary = summary.replace(prompt, "").trim();
              }
              
              console.log(summary);
            } catch (error) {
              console.error("Error generating summary:", error.message);
              process.exit(1);
            }
          })();
          EOF
          
          node /tmp/generate_summary.js > /tmp/summary_output.txt 2>&1
          
          SUMMARY=$(cat /tmp/summary_output.txt)
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post summary as comment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const summary = `${{ steps.summary.outputs.summary }}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 AI-Generated PR Summary (Powered by Mistral)\n\n${summary}\n\n---\n*Generated by Mistral AI via Hugging Face*`
            });

      - name: Handle errors
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ⚠️ AI Summary Generation Failed\n\nThere was an error generating the AI summary for this PR. Please check the workflow logs for details.`
            });
