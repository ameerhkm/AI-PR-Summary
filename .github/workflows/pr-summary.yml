name: AI PR Summary with Gemini

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - develop

permissions:
  pull-requests: write
  contents: read

jobs:
  generate-summary:
    runs-on: ubuntu-latest
    name: Generate PR Summary
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR details
        id: pr_details
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_BODY="${{ github.event.pull_request.body }}"
          
          git fetch origin ${{ github.event.pull_request.head.ref }}
          DIFF=$(git diff origin/${{ github.event.pull_request.base.ref }}...origin/${{ github.event.pull_request.head.ref }} --stat)
          
          echo "$PR_TITLE" > /tmp/pr_title.txt
          echo "$PR_BODY" > /tmp/pr_body.txt
          echo "$DIFF" > /tmp/pr_diff.txt
          
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # ◄ Upgraded to Node 24 to match runner defaults

      - name: Initialize Package and Install SDK
        run: |
          npm init -y
          npm pkg set type="module" # ◄ Tells Node to allow clean Top-Level Awaits
          npm install @google/genai

      - name: Create AI summary with Gemini
        id: summary
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cat > generate_summary.js << 'EOF'
          import fs from "fs";
          import { GoogleGenAI } from "@google/genai";

          const ai = new GoogleGenAI({ apiKey: process.env.GEMINI_API_KEY });
          
          const title = fs.readFileSync("/tmp/pr_title.txt", "utf8").trim();
          const body = fs.readFileSync("/tmp/pr_body.txt", "utf8").trim();
          const diff = fs.readFileSync("/tmp/pr_diff.txt", "utf8").trim();
          
          const prompt = `You are an expert DevOps engineer and code reviewer. Generate a concise GitHub PR summary comment based on:
          
          PR Title: ${title}
          PR Description: ${body}
          Changes Summary: ${diff}
          
          Please provide:
          1. A brief summary of what the PR does
          2. Key changes made
          3. Impact assessment
          4. Any potential concerns or considerations
          
          Format your output strictly as clean, friendly GitHub markdown. Keep it under 400 words.`;
          
          try {
            // ◄ Linear, synchronous evaluation prevents background process race dropouts
            const response = await ai.models.generateContent({
              model: 'gemini-2.5-flash',
              contents: prompt,
            });
            
            if (!response.text) {
              throw new Error("Empty text string returned from the Gemini endpoint.");
            }
            
            // Write output directly to the targeted output file
            fs.writeFileSync("/tmp/summary_final.txt", response.text);
          } catch (error) {
            console.error("Error generating Gemini summary:", error.message);
            process.exit(1);
          }
          EOF
          
          // Execute script and pass results back safely to pipeline buffers
          node generate_summary.js
          
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/summary_final.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post summary as comment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const summary = `${{ steps.summary.outputs.summary }}`;
            const issueNumber = context.issue.number || ${{ steps.pr_details.outputs.pr_number }} || 1;
            
            github.rest.issues.createComment({
              issue_number: issueNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 AI-Generated PR Summary (Powered by Google Gemini)\n\n${summary}\n\n---\n*Generated using Gemini 2.5 Flash on the free developer tier.*`
            });

      - name: Handle errors
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.issue.number || ${{ steps.pr_details.outputs.pr_number }} || 1;
            github.rest.issues.createComment({
              issue_number: issueNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ⚠️ AI Summary Generation Failed\n\nThere was an error compiling the Gemini text model results. Please check your GitHub Actions execution logs for error printouts.`
            });
