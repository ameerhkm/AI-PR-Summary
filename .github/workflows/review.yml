name: AI Code Review

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# This tells GitHub the called workflow is allowed to write PR comments
# Without this the permission is blocked at the org/repo level
permissions:
  contents: read
  pull-requests: write

jobs:
  analyze:
    uses: ameerhkm/central-compliance-tool/.github/workflows/review.yml@main   # ← points to central repo
    secrets:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
